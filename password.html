<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 생성기 - utils.chuckpark.kr</title>
    <meta name="description" content="강한 비밀번호 생성기" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <a class="back-link" href="./">← utils 목록</a>
        <h1>비밀번호 생성기</h1>
        <p class="desc">옵션을 선택해 원하는 규칙의 비밀번호를 생성할 수 있습니다.</p>

        <div class="row">
          <label for="length">비밀번호 길이</label>
          <input id="length" type="number" min="8" max="64" value="20" inputmode="numeric" />
        </div>

        <fieldset class="option-group">
          <legend>문자 구성 옵션</legend>
          <label class="check"><input id="optLower" type="checkbox" checked /> 영문 소문자</label>
          <label class="check"><input id="optUpper" type="checkbox" checked /> 영문 대문자</label>
          <label class="check"><input id="optDigits" type="checkbox" checked /> 숫자</label>
          <label class="check"><input id="optSpecial" type="checkbox" checked /> 특수문자 (@#%+=_-)</label>
        </fieldset>

        <div class="actions">
          <button id="generateBtn" class="btn primary" type="button">비밀번호 생성</button>
          <button id="copyBtn" class="btn" type="button">복사</button>
        </div>

        <label for="result" class="result-label">생성 결과</label>
        <textarea id="result" rows="3" readonly placeholder="생성된 비밀번호가 여기에 표시됩니다."></textarea>

        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>
    </main>

    <script src="./password.js"></script>
  </body>
</html>
