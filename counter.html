<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글자수 계산기 - utils.chuckpark.kr</title>
    <meta name="description" content="글자수 계산기" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <a class="back-link" href="./">← utils 목록</a>
        <h1>글자수 계산기</h1>
        <p class="desc">입력 텍스트의 글자수와 공백 제외 글자수, 단어 수를 계산합니다.</p>

        <label for="textInput">텍스트 입력</label>
        <textarea id="textInput" rows="8" placeholder="여기에 텍스트를 입력해주세요."></textarea>

        <div class="stats">
          <div class="stat"><span>전체 글자수</span><strong id="charCount">0</strong></div>
          <div class="stat"><span>공백 제외</span><strong id="charNoSpaceCount">0</strong></div>
          <div class="stat"><span>단어 수</span><strong id="wordCount">0</strong></div>
          <div class="stat"><span>줄 수</span><strong id="lineCount">0</strong></div>
        </div>
      </section>
    </main>

    <script src="./counter.js"></script>
  </body>
</html>
