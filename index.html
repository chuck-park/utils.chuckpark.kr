<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>utils.chuckpark.kr - 비밀번호 생성기</title>
    <meta name="description" content="강한 비밀번호 생성기" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>비밀번호 생성기</h1>
        <p class="desc">소문자/대문자/숫자/특수문자를 포함한 강한 비밀번호를 생성합니다.</p>

        <div class="row">
          <label for="length">비밀번호 길이</label>
          <input id="length" type="number" min="8" max="64" value="24" inputmode="numeric" />
        </div>

        <div class="actions">
          <button id="generateBtn" class="btn primary" type="button">비밀번호 생성</button>
          <button id="copyBtn" class="btn" type="button">복사</button>
        </div>

        <label for="result" class="result-label">생성 결과</label>
        <textarea id="result" rows="3" readonly placeholder="생성된 비밀번호가 여기에 표시됩니다."></textarea>

        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
